# Shared configuration, committed to git and identical on both machines.
# Machine-specific paths live in config.local.yaml (see config.local.yaml.example).

site:
  title: "Sailing Nomads"
  base_url: "https://www.sailingnomads.ch"
  # Language served at the site root; all others live under /<lang>/.
  default_language: en
  deploy_check:
    timeout_seconds: 900
    poll_seconds: 30

languages:
  supported: [en, de, es, fr, it, arrr]

translate:
  model: gpt-4.1
  temperature: 0.3
  pirate_temperature: 0.9
  max_retries: 3

social:
  # Suggested manual posting cadence; used to compute suggested dates in exports.
  posts_per_week: 7

watch:
  # Run the pipeline once no file event arrived for this long (edits and
  # Syncthing transfers come in bursts).
  debounce_seconds: 900

media:
  crop_focus:
    enabled: true
    model: gpt-5.4-mini

channels:
  hugo:
    kind: site
    enabled: true
    image: { mode: copy }
    video: { aspect: "16:9", width: 700, height: 394, pad_mode: crop }
  facebook:
    kind: social
    enabled: true
    delivery: export
    language: en
    link_mode: inline
    max_media_per_post: 10
    caption_model: gpt-5.5
    image: { mode: convert, max_edge: 2048, format: jpeg, quality: 90 }
    video: { max_seconds: 240 }
    reel_video: { aspect: "4:5", width: 1080, height: 1350, max_seconds: 240, pad_mode: crop }
  instagram:
    kind: social
    enabled: true
    delivery: export
    language: en
    link_mode: bio
    max_media_per_post: 10
    caption_model: gpt-5.5
    image: { mode: convert, aspect: "4:5", width: 1080, height: 1350, format: jpeg, quality: 90 }
    video: { aspect: "4:5", width: 1080, height: 1350, max_seconds: 90, pad_mode: crop }
    # 4:5 (not 9:16): manual upload via instagram.com rejects taller ratios with
    # "4:5 bis 16:9". Mobile Reels tab prefers 9:16, but our export workflow is desktop.
    reel_video: { aspect: "4:5", width: 1080, height: 1350, max_seconds: 90, pad_mode: crop }
  x:
    kind: social
    enabled: true
    delivery: export
    language: en
    link_mode: inline
    max_media_per_post: 4
    max_chars: 280
    caption_model: gpt-5.5
    image: { mode: convert, max_edge: 2048, format: jpeg, quality: 90 }
    video: { max_seconds: 140 }
  substack:
    kind: article
    enabled: false # tracked in state; publishing stays manual (Narrareach) for now
  medium:
    kind: article
    enabled: false
